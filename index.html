<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Eating the World</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsvectormap@1.5.3/dist/css/jsvectormap.min.css">
<style>
  :root { --done:#d2691e; --bg:#faf7f2; --ink:#2b2b2b; --line:#e3ddd2; }
  * { box-sizing:border-box; }
  body { margin:0; font:16px/1.5 system-ui,sans-serif; color:var(--ink); background:var(--bg); }
  header { display:flex; gap:.75rem; align-items:center; flex-wrap:wrap;
    padding:.75rem 1rem; border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--bg); z-index:5; }
  header h1 { font-size:1.1rem; margin:0; margin-right:auto; }
  button, input { font:inherit; }
  button { cursor:pointer; border:1px solid var(--line); background:#fff; border-radius:6px; padding:.35rem .7rem; }
  button.on { background:var(--done); color:#fff; border-color:var(--done); }
  #search { padding:.35rem .6rem; border:1px solid var(--line); border-radius:6px; min-width:14rem; }
  .wrap { display:grid; grid-template-columns:1fr 1fr; gap:1rem; padding:1rem; }
  @media (max-width:860px){ .wrap{ grid-template-columns:1fr; } #map{ height:38vh; min-height:240px; } }
  #map { width:100%; height:70vh; min-height:380px; }
  #results { position:absolute; background:#fff; border:1px solid var(--line); border-radius:6px;
    max-height:16rem; overflow:auto; min-width:14rem; box-shadow:0 6px 20px #0002; z-index:9; }
  #results div { padding:.35rem .6rem; cursor:pointer; }
  #results div:hover, #results .sel { background:var(--bg); }
  #panel { background:#fff; border:1px solid var(--line); border-radius:10px; padding:1rem 1.25rem; }
  #panel h2 { margin:.2rem 0; }
  .links a { margin-right:1rem; }
  .cat { border-top:1px solid var(--line); padding:.75rem 0; }
  .cat h3 { margin:.2rem 0; text-transform:capitalize; }
  textarea { width:100%; min-height:4.5rem; font:inherit; border:1px solid var(--line); border-radius:6px; padding:.4rem; }
  .muted { color:#888; }
  .pick a { display:block; }
  .pick > div { margin:.15rem 0; }
  .note { font-size:.85rem; color:#666; white-space:pre-wrap; }
  .chips { display:flex; flex-wrap:wrap; gap:.4rem; margin:.4rem 0; }
  .chip { font-size:.85rem; text-decoration:none; background:var(--bg); border:1px solid var(--line);
    border-radius:999px; padding:.2rem .6rem; color:var(--ink); }
  .chip:hover { border-color:var(--done); }
  .row { display:flex; gap:.5rem; align-items:center; flex-wrap:wrap; }
  label { font-size:.85rem; color:#666; }
  .hide { display:none !important; }
</style>
</head>
<body>
<header>
  <h1>🍽️ Eating the World</h1>
  <input id="search" placeholder="Search a country…" autocomplete="off">
  <button id="mode">Research mode</button>
  <input id="token" class="hide" type="password" placeholder="edit token" autocomplete="off">
  <button id="publish" class="hide">Publish</button>
  <button id="export" class="hide" title="Download data.json to commit by hand">Export</button>
  <button id="pull" class="hide" title="Discard local drafts and load the published version">↻</button>
</header>
<div class="wrap">
  <div id="map"></div>
  <div id="panel"><p class="muted">Pick a country on the map or search above.</p></div>
</div>
<div id="results" class="hide"></div>

<script src="https://cdn.jsdelivr.net/npm/jsvectormap@1.5.3/dist/js/jsvectormap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsvectormap@1.5.3/dist/maps/world.js"></script>
<script src="app.js"></script>
</body>
</html>
